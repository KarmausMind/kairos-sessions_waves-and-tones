<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KM Sessions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#f0ede8;
  --muted:rgba(240,237,232,0.50);
  --dim:rgba(240,237,232,0.22);
  --gold:rgba(212,185,140,0.85);
  --gold-dim:rgba(212,185,140,0.35);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif;
  --serif:Georgia,"Palatino Linotype",Palatino,serif;
  --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:#06080f;color:var(--ink);font-family:var(--sans);touch-action:pan-y pinch-zoom}

#ambientBackdrop{position:fixed;inset:-26%;width:152vw;height:152vh;z-index:0;will-change:opacity;}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;pointer-events:none;will-change:opacity;opacity:0}
#particleCanvas{z-index:2;mix-blend-mode:screen}
#fireworkCanvas{z-index:3;mix-blend-mode:screen;pointer-events:none}
#glowCanvas{z-index:4;mix-blend-mode:soft-light}

.flex-spacer{flex:1}
.ui{position:relative;z-index:100;width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:max(36px,env(safe-area-inset-top)) max(36px,env(safe-area-inset-left)) max(52px,env(safe-area-inset-bottom)) max(36px,env(safe-area-inset-right));pointer-events:none;}
.header{display:flex;justify-content:space-between;align-items:baseline;opacity:0;transition:opacity 1s cubic-bezier(0.2,0.9,0.4,1);pointer-events:none;}
.header.visible{opacity:1}
.brand{font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:0.32em;text-transform:uppercase;color:var(--dim);}
.session-time{font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:0.05em;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1;}

.gateway{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:calc(100% - 56px);max-width:480px;background:rgba(4,5,10,0.88);backdrop-filter:blur(56px);-webkit-backdrop-filter:blur(56px);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:56px 52px 48px;pointer-events:auto;z-index:200;transition:opacity 0.4s cubic-bezier(0.4,0,1,1),transform 0.4s cubic-bezier(0.4,0,1,1);box-shadow:0 64px 120px rgba(0,0,0,0.75);}
.gateway.hidden{opacity:0;transform:translate(-50%,-50%) scale(0.98);pointer-events:none}
body.session-active #particleCanvas{opacity:1;transition:opacity 0.5s cubic-bezier(0.2,0.9,0.4,1) 0.1s;}
body.session-active #fireworkCanvas{opacity:1;transition:opacity 0.5s cubic-bezier(0.2,0.9,0.4,1) 0.2s;}
body.session-active #glowCanvas{opacity:1;transition:opacity 0.5s cubic-bezier(0.2,0.9,0.4,1) 0s;}
body.session-active #ambientBackdrop{will-change:background;}
.eyebrow{font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:0.32em;text-transform:uppercase;color:var(--dim);margin-bottom:16px;}
.headline{font-family:var(--serif);font-size:clamp(36px,6vw,52px);font-weight:400;letter-spacing:-0.5px;line-height:1.12;color:var(--ink);margin-bottom:6px;}
.rule{width:48px;height:1px;background:var(--gold-dim);margin:20px 0 22px;}
.subtitle{font-family:var(--serif);font-style:italic;font-size:14px;line-height:1.65;color:var(--muted);margin-bottom:36px;letter-spacing:0.01em;}
.sub-1{opacity:1;}
.sub-2{opacity:0;transition:opacity 0.6s ease;}
.gateway.visible .sub-2{opacity:1;transition:opacity 0.6s ease 0.4s;}

.dur{background:transparent;border:0.5px solid rgba(255,255,255,0.15);border-radius:3px;padding:8px 16px;min-height:44px;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:rgba(240,237,232,0.38);cursor:pointer;transition:all 0.2s ease;display:flex;align-items:center;}
.dur.active{background:rgba(212,185,140,0.08);border-color:var(--gold-dim);color:var(--gold);}
.dur:hover:not(.active){border-color:rgba(255,255,255,0.22);color:var(--muted)}
.dur:focus-visible{outline:none;border-color:var(--gold-dim);color:var(--muted);}

.duration-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start;margin-bottom:28px;}
.begin{display:flex;align-items:center;gap:10px;background:transparent;border:none;padding:12px 0;cursor:pointer;min-height:44px;opacity:0;transition:opacity 0.6s ease;}
.begin.visible{opacity:1}.begin:hover{opacity:0.75}.begin:active{opacity:0.55}
.begin-text{font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink);}
.begin-arrow{width:28px;height:28px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink);transition:border-color 0.2s,transform 0.2s;}
@keyframes arrowBreath{0%,100%{opacity:0.5}50%{opacity:1}}
.begin-arrow{animation:arrowBreath 2s ease-in-out infinite;}
.begin:hover .begin-arrow{border-color:rgba(255,255,255,0.55);transform:translateX(2px);animation:none;opacity:1;}
.begin:focus-visible{outline:none;}
.begin:focus-visible .begin-arrow{border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,185,140,0.35);}
.attribution{margin-top:32px;padding-top:22px;border-top:1px solid rgba(255,255,255,0.04);}
.attr-name{font-family:var(--serif);font-size:11px;font-weight:400;color:var(--muted);letter-spacing:0.02em;}
.attr-sub{font-family:var(--mono);font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:3px;}

.bottom-strip{display:flex;align-items:center;justify-content:center;gap:14px;pointer-events:none;opacity:0;transform:translateY(14px);transition:opacity 0.7s cubic-bezier(0.2,0.9,0.4,1),transform 0.7s cubic-bezier(0.2,0.9,0.4,1);align-self:center;}
.bottom-strip.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.ellipsis-btn{background:transparent;border:none;padding:10px 4px;font-family:var(--mono);font-size:20px;letter-spacing:0.22em;color:rgba(240,237,232,0.90);cursor:pointer;transition:color 0.2s,transform 0.15s;line-height:1;}
.ellipsis-btn:hover{color:#fff;transform:scale(1.08)}.ellipsis-btn:active{transform:scale(0.95)}
.controls-label{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(240,237,232,0.72);cursor:pointer;padding:10px 0;transition:color 0.2s;user-select:none;}
.controls-label:hover{color:rgba(240,237,232,0.95)}
.strip-sep{width:1px;height:12px;background:rgba(255,255,255,0.12);}

.drawer-time{
width:auto;
text-align:center;
font-family:var(--mono);
font-size:9px;
letter-spacing:0.10em;
color:rgba(240,237,232,0.30);
margin:0 4px 0 0;
font-variant-numeric:tabular-nums;
white-space:nowrap;
}
.drawer{
position:fixed;
left:50%;
right:auto;
bottom:max(22px,env(safe-area-inset-bottom));
width:auto;
max-width:calc(100vw - 28px);
z-index:150;
background:rgba(5,6,11,0.24);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.035);
border-radius:999px;
padding:8px 12px;
display:flex;
flex-wrap:nowrap;
justify-content:center;
align-items:center;
gap:10px;
transform:translate(-50%,calc(100% + 28px));
opacity:0;
transition:transform 0.34s cubic-bezier(0.2,0.9,0.4,1),opacity 0.24s ease;
pointer-events:none;
box-shadow:none;
}
.drawer.open{
transform:translate(-50%,0);
opacity:1;
pointer-events:auto;
}
.d-btn{
background:transparent;
border:none;
font-family:var(--mono);
font-size:8px;
letter-spacing:0.13em;
text-transform:uppercase;
color:rgba(240,237,232,0.48);
cursor:pointer;
padding:7px 8px;
min-height:30px;
border-radius:999px;
transition:background 0.18s,color 0.18s;
white-space:nowrap;
}
.d-btn:hover{background:rgba(255,255,255,0.06);color:var(--ink)}
.d-btn.restore{color:var(--gold-dim);font-size:9px;letter-spacing:0.2em;}
.d-btn.restore:hover{color:var(--gold);background:rgba(212,185,140,0.06)}
.mode-group{display:flex;gap:4px}
.mode-btn{
background:transparent;
border:0.5px solid rgba(255,255,255,0.08);
border-radius:999px;
padding:5px 10px;
font-family:var(--mono);
font-size:8px;
letter-spacing:0.08em;
color:rgba(240,237,232,0.32);
cursor:pointer;
transition:all 0.18s;
}
.mode-btn.active{background:rgba(212,185,140,0.07);border-color:var(--gold-dim);color:var(--gold);}
.mode-btn:hover:not(.active){border-color:rgba(255,255,255,0.22);color:var(--muted)}
.sl-group{display:flex;align-items:center;gap:6px}
.sl-label{
font-family:var(--mono);
font-size:7px;
letter-spacing:0.12em;
text-transform:uppercase;
color:rgba(240,237,232,0.26);
min-width:22px;
}
input[type="range"]{
-webkit-appearance:none;
width:72px;
height:1px;
background:rgba(255,255,255,0.18);
border-radius:1px;
outline:none;
}
input[type="range"]::-webkit-slider-thumb{
-webkit-appearance:none;
width:8px;
height:8px;
border-radius:50%;
background:rgba(240,237,232,0.82);
cursor:pointer;
box-shadow:0 0 5px rgba(240,237,232,0.25);
}
input[type="range"]::-moz-range-thumb{
width:8px;
height:8px;
border-radius:50%;
background:rgba(240,237,232,0.82);
cursor:pointer;
box-shadow:0 0 5px rgba(240,237,232,0.25);
border:none;
}
@media(prefers-reduced-motion: reduce){
  canvas{display:none!important;}
  #ambientBackdrop{animation:none;}
  .gateway,.bottom-strip,.header,.begin-arrow{transition:none;}
  .begin-arrow{animation:none!important;opacity:1;}
  .sub-2{transition:none!important;opacity:1;}
}
@media(max-width:840px){
  .gateway{padding:44px 36px 40px;width:calc(100% - 40px)}
  .headline{font-size:clamp(38px,8vw,44px)}
  .drawer{max-width:calc(100vw - 24px);padding:14px 14px;gap:10px 14px;bottom:max(18px,env(safe-area-inset-bottom))}
  input[type="range"]{width:80px}
}
@media(max-width:600px){
  .drawer{flex-wrap:wrap;justify-content:center;gap:10px;max-width:calc(100vw - 20px);}
}
</style>
</head>
<body>

<div id="ambientBackdrop"></div>
<canvas id="particleCanvas"></canvas>
<canvas id="fireworkCanvas"></canvas>
<canvas id="glowCanvas"></canvas>

<div class="ui">
  <div class="header" id="header">
    <div class="brand">KM Sessions</div>
    <div class="session-time" id="sessionTime" aria-live="polite" aria-atomic="true"></div>
  </div>
  <div class="flex-spacer"></div>
  <div class="bottom-strip" id="bottomStrip">
    <button class="ellipsis-btn" id="ellipsisBtn" aria-label="Open controls">···</button>
    <div class="strip-sep" aria-hidden="true"></div>
    <span class="controls-label" id="controlsLabel" tabindex="0" role="button" aria-label="Open controls">Controls</span>
  </div>
</div>

<div class="gateway" id="gateway">
  <div class="eyebrow">KM Sessions</div>
  <div class="headline">Enter quietly.</div>
  <div class="rule" aria-hidden="true"></div>
  <div class="subtitle"><span class="sub-1">What your mind needs</span><br><span class="sub-2">when the noise won't stop.</span></div>
  <button class="begin" id="beginBtn">
    <span class="begin-text">Begin Session</span>
    <span class="begin-arrow" aria-hidden="true">&#8594;</span>
  </button>
  <div class="duration-row" id="durationRow">
    <button class="dur" data-min="3">3</button>
    <button class="dur" data-min="5">5</button>
    <button class="dur active" data-min="10">10</button>
    <button class="dur" data-min="20">20</button>
    <button class="dur" data-min="50">50</button>
  </div>
  <div class="attribution">
    <div class="attr-name">Manuel Acosta</div>
    <div class="attr-sub">LMHC · Miami, Florida</div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-time" id="drawerTime"></div>
  <div class="mode-group" id="modeGroup">
    <button class="mode-btn active" data-mode="calm">Calm</button>
    <button class="mode-btn" data-mode="deep">Deep</button>
    <button class="mode-btn" data-mode="museum">Museum</button>
  </div>
  <div class="sl-group"><span class="sl-label">Vol</span><input type="range" id="volSlider" min="0" max="100" value="82" step="1"></div>
  <div class="sl-group"><span class="sl-label">Tone</span><input type="range" id="toneSlider" min="0" max="100" value="48" step="1"></div>
  <div class="sl-group"><span class="sl-label">Light</span><input type="range" id="lightSlider" min="20" max="100" value="72" step="1"></div>
  <button class="d-btn" id="pauseBtn">⏸ Pause</button>
  <button class="d-btn" id="returnBtn">Return</button>
</div>

<script>
(function(){
'use strict';

const S={IDLE:0,ACTIVE:1,PAUSED:2,ENDING:3};
let state=S.IDLE;
const TRANS={[S.IDLE]:[S.ACTIVE],[S.ACTIVE]:[S.PAUSED,S.ENDING],[S.PAUSED]:[S.ACTIVE,S.ENDING],[S.ENDING]:[S.IDLE]};
function canTransition(n){return TRANS[state]?.includes(n)||false;}
function setState(n){if(!canTransition(n))return false;state=n;return true;}
function transition(n){return setState(n);}

const gateway=document.getElementById('gateway'),header=document.getElementById('header'),bottomStrip=document.getElementById('bottomStrip'),ellipsisBtn=document.getElementById('ellipsisBtn'),controlsLabel=document.getElementById('controlsLabel'),drawer=document.getElementById('drawer'),sessionTime=document.getElementById('sessionTime'),beginBtn=document.getElementById('beginBtn'),pauseBtn=document.getElementById('pauseBtn'),returnBtn=document.getElementById('returnBtn'),volSlider=document.getElementById('volSlider'),toneSlider=document.getElementById('toneSlider'),lightSlider=document.getElementById('lightSlider'),modeBtns=document.querySelectorAll('.mode-btn'),durationBtns=document.querySelectorAll('.dur'),ambient=document.getElementById('ambientBackdrop'),drawerTime=document.getElementById('drawerTime');

const particleCanvas=document.getElementById('particleCanvas'),fireworkCanvas=document.getElementById('fireworkCanvas'),glowCanvas=document.getElementById('glowCanvas');
let ctxP,ctxF,ctxG,W,H,dpr,cx,cy;

let sessionMinutes=10,sessionMsRemain=0,sessionTotalMs=0,sessionElapsedMs=0,timerStartWall=0,timerRafId=null,drawerOpen=false,lightVal=72,volVal=82;
let timeline=0,globalHue=208,targetHue=208,energy=0,flash=0,audioVelocityPulse=0,globalAlpha=1,lastT=0,bgThrottle=0,bgDirty=true,cachedGradG=null,cachedGradHue=-999;

const MODES={calm:{count:4500,hue:208},deep:{count:8000,hue:260},museum:{count:12000,hue:190}};
let currentMode='calm',targetCount=MODES.calm.count,visibleCount=MODES.calm.count;

// KM curated hue palette
const KM_HUES=[195,208,220,240,252,260,270,280];
let sessionProgress=0;
let dynamicCap=12000,frameDropCounter=0;
let prad_ref=0;

function phaseEase(p){
  if(p<0.15)return p/0.15*0.3;
  if(p<0.40)return 0.30+(p-0.15)/0.25*0.55;
  if(p<0.75)return 0.85+(p-0.40)/0.35*0.15;
  return 1.0-(p-0.75)/0.25*0.22;
}
function getTemporalParams(p){
  const e=phaseEase(p);
  return{densityMult:0.70+e*0.30,alphaMult:0.65+e*0.35,speedMult:0.60+e*0.55,audioSpacing:e<0.5?1.8-e*1.2:0.6+(e-0.5)*1.4,toneDecay:2.5+e*3.5,bassGain:0.02+e*0.06};
}

// ── ACTOR C: MUSEUM FIREWORKS ─────────────────────────────────────────────────
const FPOOL=8000;
const fx=new Float32Array(FPOOL),fy=new Float32Array(FPOOL),fpvx=new Float32Array(FPOOL),fpvy=new Float32Array(FPOOL),flife=new Float32Array(FPOOL),fmax=new Float32Array(FPOOL),fopac=new Float32Array(FPOOL),fsize=new Float32Array(FPOOL),fhoff=new Float32Array(FPOOL),fstretch=new Float32Array(FPOOL);
let fireworkAlpha=0,activeBurstIdx=0,burstTimer=0;
const BURST_ANCHORS=[{x:0.28,y:0.28},{x:0.72,y:0.30},{x:0.50,y:0.52},{x:0.22,y:0.68},{x:0.78,y:0.65}];
const FW_OFFSETS=[0,15,30,180,195,210,260,270,345,355];
function seedFirework(i){
  const angle=Math.random()*Math.PI*2,power=Math.random()*3.5+0.8;
  const anchor=BURST_ANCHORS[activeBurstIdx%BURST_ANCHORS.length];
  fx[i]=anchor.x*W+(Math.random()-0.5)*60; fy[i]=anchor.y*H+(Math.random()-0.5)*60;
  fpvx[i]=Math.cos(angle)*power*dpr; fpvy[i]=Math.sin(angle)*power*dpr;
  flife[i]=0; fmax[i]=0.4+Math.random()*0.6;
  fopac[i]=0.25+Math.random()*0.45; fsize[i]=(0.5+Math.random()*0.8)*dpr;
  fhoff[i]=FW_OFFSETS[Math.floor(Math.random()*FW_OFFSETS.length)];
  fstretch[i]=1.5+Math.random()*2.0;
}
function populateFireworks(){for(let i=0;i<FPOOL;i++)seedFirework(i);}

// ── RING PARTICLE POOL ────────────────────────────────────────────────────────
const POOL=12000;
const px_a=new Float32Array(POOL),py_a=new Float32Array(POOL),pang=new Float32Array(POOL),prad=new Float32Array(POOL),pspd=new Float32Array(POOL),psgn=new Int8Array(POOL),palp=new Float32Array(POOL),psz=new Float32Array(POOL),plif=new Float32Array(POOL),pmax=new Float32Array(POOL);
function seedParticle(i,scatter){
  const a=Math.random()*Math.PI*2,baseR=Math.min(W,H)*0.305;
  pang[i]=a; prad[i]=baseR+(Math.random()-0.5)*10;
  pspd[i]=0.0004+Math.random()*0.0014; psgn[i]=Math.random()<0.5?-1:1;
  palp[i]=0.20+Math.random()*0.55; psz[i]=Math.min((0.8+Math.random()*0.7)*dpr,2.0*dpr);
  plif[i]=scatter?Math.random():0; pmax[i]=0.65+Math.random()*0.55;
  const d=scatter?baseR+(Math.random()-0.5)*40:(Math.random()-0.5)*15;
  px_a[i]=cx+Math.cos(a)*d; py_a[i]=cy+Math.sin(a)*d;
}
function populatePool(){for(let i=0;i<POOL;i++)seedParticle(i,true);}

function repositionParticles(){
  const baseR=Math.min(W,H)*0.305;
  for(let i=0;i<POOL;i++){
    prad[i]=baseR+(Math.random()-0.5)*10;
    px_a[i]=cx+Math.cos(pang[i])*prad[i];
    py_a[i]=cy+Math.sin(pang[i])*prad[i];
  }
  for(let i=0;i<FPOOL;i++){
    const anchor=BURST_ANCHORS[activeBurstIdx%BURST_ANCHORS.length];
    fx[i]=anchor.x*W+(Math.random()-0.5)*60;
    fy[i]=anchor.y*H+(Math.random()-0.5)*60;
  }
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,window.innerWidth<840?1.5:2.0);
  W=Math.floor(window.innerWidth*dpr); H=Math.floor(window.innerHeight*dpr);
  cx=W/2; cy=H/2;
  prad_ref=Math.min(window.innerWidth,window.innerHeight)*0.305*Math.min(window.devicePixelRatio||1,window.innerWidth<840?1.5:2.0);
  [particleCanvas,fireworkCanvas,glowCanvas].forEach(c=>{
    c.width=W; c.height=H;
    c.style.width=window.innerWidth+'px'; c.style.height=window.innerHeight+'px';
  });
  ctxP=particleCanvas.getContext('2d',{alpha:true,desynchronized:true});
  ctxF=fireworkCanvas.getContext('2d',{alpha:true,desynchronized:true});
  ctxG=glowCanvas.getContext('2d',{alpha:true,desynchronized:true});
  if(state===S.IDLE){populatePool();populateFireworks();}
  else repositionParticles();
  bgDirty=true; cachedGradG=null;
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx=null,masterGain=null,filterNode=null;
let melTimer=null,bassTimer=null,destelloTimer=null;
let recentMel=[],recentBass=[],audioGen=0;
let melNoteCount=0,inSilence=false,silenceTimer=null;
const MEL=[220,261.63,293.66,329.63,392,440]; // A3-A4 — full pentatonic, warm ceiling
const BASS=[55,65.41,82.41,110];
const DESTELLO_ROOTS=[220,261.63,293.66,329.63,440];
const MASTER_CEILING = 0.78;

function uniqueNote(pool,recent){
  let av=pool.filter(n=>!recent.includes(n));
  if(!av.length)av=pool;
  const n=av[Math.floor(Math.random()*av.length)];
  recent.unshift(n);if(recent.length>6)recent.pop();return n;
}
function initAudio(){
  if(audioCtx)return;
  const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
  audioCtx=new AC();
  masterGain=audioCtx.createGain();masterGain.gain.value=0;
  filterNode=audioCtx.createBiquadFilter();filterNode.type='lowpass';filterNode.frequency.value=2200;filterNode.Q.value=0.6;
  const comp=audioCtx.createDynamicsCompressor();comp.threshold.value=-16;comp.knee.value=24;comp.ratio.value=4;comp.attack.value=0.03;comp.release.value=0.35;
  // Clean dry path — no phase cancellation
  masterGain.connect(filterNode);filterNode.connect(comp);comp.connect(audioCtx.destination);

  if(!cachedGradG||Math.abs(globalHue-cachedGradHue)>0.5){
    cachedGradG=ctxG.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.45);
    cachedGradG.addColorStop(0,`hsla(${globalHue},85%,75%,1)`);
    cachedGradG.addColorStop(0.5,`hsla(${(globalHue+60)%360},80%,65%,0.5)`);
    cachedGradG.addColorStop(1,'transparent');cachedGradHue=globalHue;
  }
  const glowScale=1.0-fireworkAlpha,glowA=(flash*0.12+energy*0.06)*globalAlpha*glowScale;
  ctxG.globalAlpha=glowA>0?glowA:0.001;ctxG.fillStyle=cachedGradG;ctxG.fillRect(0,0,W,H);ctxG.globalAlpha=1.0;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────

beginBtn.addEventListener('click',beginSession);
ellipsisBtn.addEventListener('click',()=>{if(state!==S.IDLE)toggleDrawer();});
controlsLabel.addEventListener('click',()=>{if(state!==S.IDLE)toggleDrawer();});
controlsLabel.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&state!==S.IDLE){e.preventDefault();toggleDrawer();}});
document.addEventListener('click',e=>{if(drawerOpen&&!drawer.contains(e.target)&&e.target!==ellipsisBtn&&e.target!==controlsLabel)closeDrawer();});
drawer.addEventListener('pointermove',resetDrawerAutoHide);
drawer.addEventListener('focusin',resetDrawerAutoHide);
drawer.addEventListener('input',resetDrawerAutoHide);
drawer.addEventListener('change',e=>{
  if(e.target.matches('input[type="range"]')){
    setTimeout(closeDrawer,900);
  }
});
drawer.addEventListener('click',resetDrawerAutoHide);
pauseBtn.addEventListener('click',()=>{if(state===S.ACTIVE)pauseSession();else if(state===S.PAUSED)resumeSession();});
returnBtn.addEventListener('click',()=>{if(state===S.ACTIVE||state===S.PAUSED)beginEnd();});
volSlider.addEventListener('input',()=>{volVal=parseInt(volSlider.value);if(state===S.ACTIVE)setVolume(true);setTimeout(closeDrawer,350);});
toneSlider.addEventListener('input',()=>{setTimbre();setTimeout(closeDrawer,350);});
lightSlider.addEventListener('input',()=>{lightVal=parseInt(lightSlider.value);bgDirty=true;setTimeout(closeDrawer,350);});
modeBtns.forEach(b=>b.addEventListener('click',()=>{setMode(b.dataset.mode);setTimeout(closeDrawer,350);}));

durationBtns.forEach(b=>b.addEventListener('click',()=>{
  durationBtns.forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  sessionMinutes=parseInt(b.dataset.min);
  if(durationRow)durationRow.classList.remove('visible');
}));

let _rt=null;
window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(resize,120);},{passive:true});
// Respect prefers-reduced-motion — pause animation for users who need it
const prefersReduced=window.matchMedia('(prefers-reduced-motion: reduce)');
if(prefersReduced.matches){
  document.documentElement.style.setProperty('--motion-ok','0');
}

// iOS audio context warm-up on first touch
document.body.addEventListener('touchstart',function warmup(){
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  document.body.removeEventListener('touchstart',warmup);
},{once:true,passive:true});

// ── BOOT ──────────────────────────────────────────────────────────────────────
resize();populatePool();populateFireworks();animate(0);
requestAnimationFrame(()=>gateway.classList.add('visible'));
setTimeout(()=>document.getElementById('beginBtn').classList.add('visible'),550);
})();
</script>
